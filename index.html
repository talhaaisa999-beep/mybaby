<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* 🔥 FORCE BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background: linear-gradient(135deg, #a100ff, #ff002f);
  background-size:200% 200%;
  animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

html,body{
  height:100%;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  background:transparent !important;
}

.page{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  background:transparent !important;
  transition:1s;
}

.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
}

.text-box{
  background:rgba(0,0,0,0.2);
  padding:30px 40px;
  border-radius:30px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  max-width:85%;
}

h1{
  font-family:'Pacifico',cursive;
  font-size:3rem;
  text-shadow:0 0 25px rgba(255,255,255,0.5);
}

p{
  font-size:1.4rem;
}

button{
  margin-top:25px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.08);
}

/* 🔥 FIXED SLIDESHOW */
.slideshow{
  width:300px;
  height:300px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  background:#000;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.slideshow img{
  width:100%;
  height:100%;
  object-fit:cover;          /* ✅ OPTION 1 APPLIED */
  object-position:center;
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transform:scale(1.05);
  transition: opacity 1s ease, transform 3s ease;
}

.slideshow img.active{
  opacity:1;
  transform:scale(1);
}

.dots{
  display:flex;
  gap:8px;
  margin:15px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ffffff60;
}

.dot.active{
  background:#fff;
}

.audio-box{
  background:rgba(0,0,0,0.2);
  padding:15px 25px;
  border-radius:25px;
}

.fall{
  position:absolute;
  top:-50px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(180deg)}
}

.teddy{
  margin:20px 0;
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}
</style>
</head>

<body>

<div class="page" id="page1">
  <div class="text-box">
    <h1>HAIIIII MYYY LOVEYYYY 💖</h1>
  </div>

  <img class="teddy" src="https://media.giphy.com/media/ASd0Ukj0y3qMM/giphy.gif" width="200">

  <button onclick="nextPage(1)">Next 💕</button>
</div>

<div class="page hidden" id="page2">
  <div class="text-box">
    <p>I KNOW UR TIRED AND EXHAUSTED SO ME MADE U A LITTLE SMTH ZAT ME HOPE CHEERS U UP 😊</p>
  </div>

  <button onclick="nextPage(2)">Continue 💖</button>
</div>

<div class="page hidden" id="page3">

  <div class="slideshow">
    <img src="https://picsum.photos/400/400?1" class="active">
    <img src="https://picsum.photos/400/400?2">
    <img src="https://picsum.photos/400/400?3">
  </div>

  <div class="dots" id="dots"></div>

  <div class="audio-box">
    <audio controls>
      <source src="your-audio.mp3" type="audio/mpeg">
    </audio>
  </div>

</div>

<script>
function nextPage(current){
  document.getElementById('page'+current).classList.add('hidden');
  document.getElementById('page'+(current+1)).classList.remove('hidden');
}

let slides=document.querySelectorAll('.slideshow img');
let dotsContainer=document.getElementById('dots');
let index=0;

slides.forEach((_,i)=>{
  let d=document.createElement('div');
  d.classList.add('dot');
  if(i===0)d.classList.add('active');
  dotsContainer.appendChild(d);
});

let dots=document.querySelectorAll('.dot');

setInterval(()=>{
  slides[index].classList.remove('active');
  dots[index].classList.remove('active');

  index=(index+1)%slides.length;

  slides[index].classList.add('active');
  dots[index].classList.add('active');
},3000);

function createFall(){
  const el=document.createElement('div');
  el.classList.add('fall');
  el.innerHTML=Math.random()>0.5?'❤️':'🌸';
  el.style.left=Math.random()*100+'vw';
  el.style.fontSize=(12+Math.random()*12)+'px';
  el.style.animationDuration=(8+Math.random()*6)+'s';

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),14000);
}

setInterval(createFall,1200);
</script>

</body>
</html>
